<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebMCP-Marktliste</title>
    <link rel="stylesheet" href="marktstyle.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- Polyfill for WebMCP -->
    <script src="https://unpkg.com/@mcp-b/global@latest/dist/index.iife.js"></script>
</head>

<body>
    <div class="app-container">
        <header>
            <div class="logo-area">
                <i class="fas fa-shopping-basket"></i>
                <h1>EINKAUFS <span class="highlight">LISTE</span></h1>
            </div>
            <div class="stats">
                <span id="total-items">0 PRODUKT</span>
                <span class="divider">|</span>
                <span id="total-stores">3 MARKT</span>
            </div>
        </header>

        <main class="markt-grid">
            <!-- markt 1 Column -->
            <div class="markt-column" id="markt1" ondrop="drop(event)" ondragover="allowDrop(event)">
                <div class="markt-header">
                    <h2>MARKT 1</h2>
                    <span class="count" id="markt1-count">0/0</span>
                </div>
                <div class="item-list" id="markt1-list">
                    <!-- Items will be injected here -->
                </div>
                <div class="add-item-area">
                    <input type="text" placeholder="Produkt hinzufügen..." onkeypress="handleEnter(event, 'markt1')">
                    <button onclick="addItemFromInput('markt1')"><i class="fas fa-plus"></i></button>
                </div>
            </div>

            <!-- markt 2 Column -->
            <div class="markt-column" id="markt2" ondrop="drop(event)" ondragover="allowDrop(event)">
                <div class="markt-header">
                    <h2>markt 2</h2>
                    <span class="count" id="markt2-count">0/0</span>
                </div>
                <div class="item-list" id="markt2-list">
                    <!-- Items will be injected here -->
                </div>
                <div class="add-item-area">
                    <input type="text" placeholder="Produkt hinzufügen..." onkeypress="handleEnter(event, 'markt2')">
                    <button onclick="addItemFromInput('markt2')"><i class="fas fa-plus"></i></button>
                </div>
            </div>

            <!-- markt 3 Column -->
            <div class="markt-column" id="markt3" ondrop="drop(event)" ondragover="allowDrop(event)">
                <div class="markt-header">
                    <h2>markt 3</h2>
                    <span class="count" id="markt3-count">0/0</span>
                </div>
                <div class="item-list" id="markt3-list">
                    <!-- Items will be injected here -->
                </div>
                <div class="add-item-area">
                    <input type="text" placeholder="Produkt hinzufügen..." onkeypress="handleEnter(event, 'markt3')">
                    <button onclick="addItemFromInput('markt3')"><i class="fas fa-plus"></i></button>
                </div>
            </div>
        </main>

        <!-- SUPER APP DEMO SECTION -->
        <section id="super-app-area" style="margin: 20px; padding: 20px; border-top: 2px dashed #ddd;">
            <h3 style="text-align:center; color: #666;">🤖 AI Agent Workspace (Super App)</h3>
            <p style="text-align:center; font-size: 0.9em; color:#888;">When you ask the agent to search, it will open
                the relevant app below:</p>

            <div class="app-frames" style="display: flex; gap: 20px; justify-content: center; margin-top: 20px;">
                <!-- markt 1 App (Hidden by default) -->
                <div class="phone-frame" id="frame-markt1"
                    style="display: none; width: 320px; height: 500px; border: 10px solid #333; border-radius: 30px; overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.2);">
                    <iframe src="markts/markt1.html" style="width: 100%; height: 100%; border: none;"></iframe>
                </div>

                <!-- markt 2 App (Hidden by default) -->
                <div class="phone-frame" id="frame-markt2"
                    style="display: none; width: 320px; height: 500px; border: 10px solid #333; border-radius: 30px; overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.2);">
                    <iframe src="markts/markt2.html" style="width: 100%; height: 100%; border: none;"></iframe>
                </div>

                <!-- markt 3 App (Hidden by default) -->
                <div class="phone-frame" id="frame-markt3"
                    style="display: none; width: 320px; height: 500px; border: 10px solid #333; border-radius: 30px; overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.2);">
                    <iframe src="markts/markt3.html" style="width: 100%; height: 100%; border: none;"></iframe>
                </div>
            </div>
        </section>

        <footer>
            <p>Powered by <span class="highlight">WebMCP</span> & AI Agents</p>
        </footer>
    </div>

    <script src="marktscript.js"></script>
</body>

</html>
